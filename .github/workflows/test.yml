name: Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and test stack (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build av1-stack
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.stack
          target: final
          platforms: linux/amd64
          outputs: type=docker,dest=/tmp/av1-stack.tar
          tags: av1-stack-test:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Load image
        run: docker load --input /tmp/av1-stack.tar

      - name: Test binaries
        run: |
          # Update this list as custom binaries are confirmed in Dockerfile.stack
          BINARIES=(av1an ab-av1 ffmpeg)
          for bin in "${BINARIES[@]}"; do
            echo "=== Testing $bin ==="
            docker run --rm av1-stack-test:local "$bin" --version
          done

  summary:
    name: Tests passed
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.build-and-test.result }}" != "success" ]]; then
            echo "Test job failed or was cancelled"
            exit 1
          fi
          echo "All tests passed"
