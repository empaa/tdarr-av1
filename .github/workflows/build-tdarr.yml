name: Build Tdarr Images

on:
  workflow_dispatch:
  push:
    paths:
      - Dockerfile.tdarr
      - Dockerfile.tdarr_node

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push tdarr
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.tdarr
          push: true
          tags: ghcr.io/empaa/tdarr:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push tdarr_node
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.tdarr_node
          push: true
          tags: ghcr.io/empaa/tdarr_node:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
